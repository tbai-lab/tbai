controllers:
  # RL walking controller (velocity-commanded)
  g1_rl:
    type: "G1RLController"
    model: "g1_rl_walking_model_unitree.onnx"

  # ASAP decoupled locomotion (velocity-commanded)
  g1_asap_locomotion:
    type: "G1ASAPController"
    model: "asap_locomotion_1017_25k.onnx"
    controller_name: "G1ASAPLocomotion"

  # Mimic controllers (motion file based)
  g1_mimic_dance102:
    type: "G1MimicController"
    model: "g1_mimic_dance102_unitree.onnx"
    motion_file: "G1_Take_102.bvh_60hz.csv"
    motion_fps: 60.0
    time_start: 2.8
    time_end: 24.0
    controller_name: "G1MimicDance102"

  g1_mimic_gangnam:
